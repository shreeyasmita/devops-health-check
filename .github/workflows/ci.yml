name: Advanced CI Pipeline

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"   # run every hour

jobs:
  build-and-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t health-check .

      - name: Run container with workspace mount
        run: docker run --rm -v ${{ github.workspace }}:/app health-check

      - name: Upload health.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-log
          path: ${{ github.workspace }}/health.log

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests
