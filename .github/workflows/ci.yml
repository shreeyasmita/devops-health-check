name: Advanced CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 * * * *"

jobs:
  build-and-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip psutil

      - name: Build Docker image
        run: docker build -t health-check .

      - name: Run container with workspace mount
        run: docker run --rm -v "${{ github.workspace }}:/app" health-check

      - name: Upload health.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-log
          path: ${{ github.workspace }}/health.log

      - name: Run unit tests
        run: python -m unittest discover -s .github/workflows/tests -p "test_*.py"

      - name: Send Slack alert for high CPU usage
        if: always()
        run: |
          if [ -f "$GITHUB_WORKSPACE/health.log" ]; then
            if grep -Eq 'CPU: ([8-9][0-9]|100)%' "$GITHUB_WORKSPACE/health.log"; then
              curl -X POST -H 'Content-type: application/json' \
                --data '{"text":"⚠️ High CPU usage detected in health-check pipeline!"}' \
                "$SLACK_WEBHOOK_URL"
            fi
          fi
